version: '3.8'

services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
      - ./data:/app/data
      - ./reports:/app/reports
    environment:
      - PYTHONUNBUFFERED=1

  mlflow:
    image: python:3.11-slim
    command: >
      bash -c "pip install mlflow && mlflow server
      --host 0.0.0.0
      --port 5000"
    ports:
      - "5000:5000"
